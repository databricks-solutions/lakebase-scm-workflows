name: Grep guard, single credential seam

# CI invariant: only scripts/lakebase/get-connection.ts is allowed to call
# `databricks postgres generate-database-credential`. Every other call site
# must go through the get-connection helper. This guard exists because the
# whole point of the credential-handoff helper (FEIP-7061) is that there's
# exactly one place credentials get minted, and CI proves it.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  grep-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Forbid credential-minting calls outside get-connection.ts
        run: |
          set -euo pipefail
          echo "Scanning for 'databricks postgres generate-database-credential' outside scripts/lakebase/get-connection.ts..."
          # Search source we own; ignore node_modules, dist, and the
          # helper itself. Also ignore the docs that *describe* the call.
          matches=$(
            grep -rnE 'databricks postgres generate-database-credential|postgres generate-database-credential' \
              --include='*.ts' --include='*.js' --include='*.sh' --include='*.yml' --include='*.yaml' \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude-dir=.github \
              --exclude-dir=templates \
              . \
            | grep -v 'scripts/lakebase/get-connection.ts' \
            | grep -v 'skills/lakebase-scm-workflows/references/get-connection.md' \
            || true
          )
          if [ -n "$matches" ]; then
            echo "::error::Found credential-minting calls outside the single seam (scripts/lakebase/get-connection.ts):"
            echo "$matches"
            echo
            echo "Route the call through getConnection() instead. See docs/get-connection.md."
            exit 1
          fi
          echo "OK, only get-connection.ts mints credentials."
